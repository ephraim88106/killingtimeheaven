  <title>UHD 픽셀 RPG - 닉네임 & 캡처 시스템</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0c10; font-family: 'Pretendard', sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel { position: absolute; padding: 15px; background: rgba(11, 12, 16, 0.95); border: 1px solid #45a29e; border-radius: 10px; color: #c5c6c7; }
        
        #status { top: 20px; left: 20px; width: 220px; }
        #hp-bar-container { width: 100%; height: 12px; background: #1f2833; margin-top: 8px; border-radius: 6px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #f7768e; transition: width 0.1s; }
        #score-board { top: 20px; right: 20px; font-size: 28px; color: #66fcf1; font-weight: bold; text-shadow: 0 0 10px #66fcf1; }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(11, 12, 16, 0.9); z-index: 100; pointer-events: auto;
        }
        
        /* 닉네임 입력창 스타일 */
        #nick-input {
            padding: 12px 20px; font-size: 18px; border-radius: 8px; border: 2px solid #45a29e;
            background: #1f2833; color: #fff; text-align: center; margin-bottom: 20px; outline: none;
        }

        #tier-text { font-size: 80px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 30px currentColor; }
        #final-score-text { color: #fff; font-size: 24px; margin-bottom: 20px; }
        #player-tag { font-size: 20px; color: #66fcf1; font-weight: bold; margin-bottom: 5px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #45a29e; border: none; border-radius: 8px; color: #0b0c10; font-weight: bold; transition: 0.3s; }
        button:hover { background: #66fcf1; transform: scale(1.05); }
        .btn-sub { background: #1f2833; color: #66fcf1; border: 1px solid #45a29e; font-size: 16px; }
    </style>
</head>
<body class="game-page">
  <!-- Kakao Top Banner Ad -->
  <div class="kakao-ad-top">
    <ins class="kakao_ad_area" style="display:none;"
      data-ad-unit="DAN-KuOsfOSzpFpIB8by"
      data-ad-width="728"
      data-ad-height="90"></ins>
    <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
  </div>
  <div class="game-wrapper">
    <div id="start-screen" class="overlay">
        <h1 style="color:#66fcf1; font-size:50px; margin-bottom:10px;">TIER CHALLENGE</h1>
        <input type="text" id="nick-field" placeholder="닉네임을 입력하세요" maxlength="8" id="nick-input">
        <button id="btn-start">GAME START</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <div id="player-tag"></div>
        <h1 style="color: #f7768e; font-size:35px; margin:0;">GAME OVER</h1>
        <div id="tier-text"></div> 
        <p id="final-score-text">최종 점수: <span id="final-score">0</span></p>
        
        <div class="btn-group">
            <button onclick="location.reload()">다시 도전</button>
        </div>
        <div class="btn-group">
            <button class="btn-sub" onclick="captureScreen()">🖼️ 캡처 저장</button>
            <button class="btn-sub" onclick="shareResult()">🔗 기록 공유</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none;">
        <div id="status" class="panel">
            <b id="display-nick" style="color:#66fcf1;">PLAYER</b>
            <div id="hp-bar-container"><div id="hp-bar"></div></div>
        </div>
        <div id="score-board" class="panel">SCORE: 0</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let isStarted = false, isGameOver = false, hp = 100, score = 0, nickname = "익명";
        const monsters = [], keys = {};

        function getTierInfo(s) {
            if (s > 4000) return { text: "개고수", color: "#ff00ff" };
            if (s > 3000) return { text: "고수", color: "#66fcf1" };
            if (s > 2000) return { text: "평민", color: "#e0af68" };
            if (s > 1000) return { text: "허접", color: "#7aa2f7" };
            return { text: "개허접", color: "#f7768e" };
        }

        async function createTex() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const c = 256;
            ctx.fillStyle = '#ff1e56'; ctx.fillRect(c-80, 50, 160, 160); 
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(c-60, 210, 120, 60); 
            ctx.fillStyle = '#414868'; ctx.fillRect(c-100, 270, 200, 200); 
            ctx.fillStyle = '#66fcf1'; ctx.fillRect(c-100, 270, 15, 200); 
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0b0c10');
        const camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 1, 1000);
        camera.position.set(30, 30, 30); camera.lookAt(0,0,0);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.querySelector('.game-wrapper').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 3));

        const hero = new THREE.Sprite(new THREE.SpriteMaterial({ map: await createTex(), fog: false }));
        hero.scale.set(6, 6, 1); hero.position.y = 3; scene.add(hero);
        const hLight = new THREE.PointLight(0x66fcf1, 20, 15); hLight.position.y = -1; hero.add(hLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x1a1b26 }));
        ground.rotation.x = -Math.PI/2; scene.add(ground);
        scene.add(new THREE.GridHelper(100, 20, 0x45a29e, 0x1f2833));

        // 게임 시작 로직 수정 (닉네임 수집)
        document.getElementById('btn-start').onclick = () => { 
            const input = document.getElementById('nick-field').value;
            nickname = input.trim() || "익명";
            document.getElementById('display-nick').innerText = nickname;
            
            isStarted = true; 
            document.getElementById('start-screen').style.display='none'; 
            document.getElementById('ui-layer').style.display='block'; 
        };
        
        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') attack(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function attack() {
            monsters.forEach(m => {
                if (m.visible && hero.position.distanceTo(m.position) < 6) {
                    m.visible = false; score += 100;
                    document.getElementById('score-board').innerText = `SCORE: ${score}`;
                }
            });
        }

        function spawn() {
            const m = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0xf7768e }));
            m.scale.set(2, 2, 1);
            m.position.set((Math.random()-0.5)*70, 1, (Math.random()-0.5)*70);
            scene.add(m); monsters.push(m);
        }

        let lastSpawn = 0;
        function animate(time) {
            requestAnimationFrame(animate);
            if (!isStarted || isGameOver) return;

            const speed = 0.25;
            let moveX = 0, moveZ = 0;
            if (keys['KeyW'] || keys['ArrowUp']) moveZ -= 1, moveX -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) moveZ += 1, moveX += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX -= 1, moveZ += 1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX += 1, moveZ -= 1;

            if (moveX !== 0 || moveZ !== 0) {
                const dir = new THREE.Vector3(moveX, 0, moveZ).normalize();
                hero.position.addScaledVector(dir, speed);
                if (moveX > 0) hero.scale.x = 6; else if (moveX < 0) hero.scale.x = -6;
            }

            camera.position.set(hero.position.x+25, hero.position.y+25, hero.position.z+25);
            camera.lookAt(hero.position);

            monsters.forEach(m => {
                if (m.visible) {
                    const dir = new THREE.Vector3().subVectors(hero.position, m.position).normalize();
                    m.position.addScaledVector(dir, 0.1 + (score/3000));
                    if (hero.position.distanceTo(m.position) < 2) hp -= 0.8;
                }
            });

            document.getElementById('hp-bar').style.width = hp + "%";
            if (hp <= 0) { 
                isGameOver = true; 
                document.getElementById('game-over-screen').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
                document.getElementById('player-tag').innerText = `PLAYER: ${nickname}`;
                
                const tier = getTierInfo(score);
                const tEl = document.getElementById('tier-text');
                tEl.innerText = tier.text;
                tEl.style.color = tier.color;
            }
            if (time - lastSpawn > 1500) { spawn(); lastSpawn = time; }
            renderer.render(scene, camera);
        }
        animate(0);
    </script>

    <script>
        function captureScreen() {
            const target = document.getElementById('game-over-screen');
            html2canvas(target, { backgroundColor: '#0b0c10' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Result_${document.getElementById('player-tag').innerText}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function shareResult() {
            const finalScore = document.getElementById('final-score').innerText;
            const tier = document.getElementById('tier-text').innerText;
            const nick = document.getElementById('display-nick').innerText;
            const shareText = `[UHD 픽셀 RPG 결과]\n플레이어: ${nick}\n나의 티어: ${tier}\n최종 점수: ${finalScore}점!\n지금 도전해보세요!`;

            if (navigator.share) {
                navigator.share({
                    title: 'UHD 픽셀 RPG 결과',
                    text: shareText,
                    url: window.location.href
                }).catch(console.error);
            } else {
                const tempElem = document.createElement('textarea');
                tempElem.value = shareText;
                document.body.appendChild(tempElem);
                tempElem.select();
                document.execCommand('copy');
                document.body.removeChild(tempElem);
                alert('기록이 클립보드에 복사되었습니다!');
            }
        }
    </script>
  </div>
  <!-- Kakao Ad Right Sidebar -->

    <ins class="kakao_ad_area" style="display:none;"
      data-ad-unit="DAN-MdXbqaI8h0qHkt7N"
      data-ad-width="160"
