  <title>UHD 픽셀 RPG - 모바일 에디션</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0c10; font-family: 'Pretendard', sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel { position: absolute; padding: 12px; background: rgba(11, 12, 16, 0.9); border: 1px solid #45a29e; border-radius: 10px; color: #c5c6c7; }
        
        #status { top: 15px; left: 15px; width: 160px; }
        #hp-bar-container { width: 100%; height: 10px; background: #1f2833; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #f7768e; transition: width 0.1s; }
        #score-board { top: 15px; right: 15px; font-size: 22px; color: #66fcf1; font-weight: bold; text-shadow: 0 0 10px #66fcf1; }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(11, 12, 16, 0.95); z-index: 100; pointer-events: auto;
        }
        
        #nick-field {
            padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #45a29e;
            background: #1f2833; color: #fff; text-align: center; margin-bottom: 20px; width: 70%; max-width: 300px;
        }

        #tier-text { font-size: 60px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 20px currentColor; }
        #final-score-text { color: #fff; font-size: 20px; margin-bottom: 20px; }
        #player-tag { font-size: 18px; color: #66fcf1; font-weight: bold; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; width: 85%; justify-content: center; }
        button { flex: 1; padding: 18px 0; font-size: 18px; cursor: pointer; background: #45a29e; border: none; border-radius: 10px; color: #0b0c10; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #66fcf1; }
        .btn-sub { background: #1f2833; color: #66fcf1; border: 1px solid #45a29e; font-size: 14px; }
        
        #guide { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #45a29e; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>
<div style="width:100%;background:#111;text-align:center;padding:6px 0 2px;position:relative;z-index:999">
<iframe src="https://coupa.ng/cmc9Oj" width="100%" height="75" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>
<p style="font-size:10px;color:#666;margin:2px 0 4px">"이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다."</p>
</div>
    <div id="start-screen" class="overlay">
        <h1 style="color:#66fcf1; font-size:40px; margin-bottom:10px;">TIER CHALLENGE</h1>
        <p style="color:#c5c6c7; margin-bottom:20px; font-size:14px;">화면을 밀어 이동, 터치해 공격!</p>
        <input type="text" id="nick-field" placeholder="닉네임 입력" maxlength="8">
        <button id="btn-start" style="width:70%; max-width:300px;">GAME START</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <div id="player-tag"></div>
        <h1 style="color: #f7768e; font-size:30px; margin:0;">GAME OVER</h1>
        <div id="tier-text"></div> 
        <p id="final-score-text">점수: <span id="final-score">0</span></p>
        
        <div class="btn-group">
            <button onclick="location.reload()">다시 도전</button>
        </div>
        <div class="btn-group">
            <button class="btn-sub" onclick="captureScreen()">🖼️ 저장</button>
            <button class="btn-sub" onclick="shareResult()">🔗 공유</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none;">
        <div id="status" class="panel">
            <b id="display-nick" style="color:#66fcf1; font-size: 12px;">PLAYER</b>
            <div id="hp-bar-container"><div id="hp-bar"></div></div>
        </div>
        <div id="score-board" class="panel">0</div>
        <div id="guide">드래그하여 이동하세요</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let isStarted = false, isGameOver = false, hp = 100, score = 0, nickname = "익명";
        const monsters = [];
        let moveDir = new THREE.Vector2(0, 0);
        let lastTouchTime = 0;

        function getTierInfo(s) {
            if (s > 4000) return { text: "개고수", color: "#ff00ff" };
            if (s > 3000) return { text: "고수", color: "#66fcf1" };
            if (s > 2000) return { text: "평민", color: "#e0af68" };
            if (s > 1000) return { text: "허접", color: "#7aa2f7" };
            return { text: "개허접", color: "#f7768e" };
        }

        async function createTex() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const c = 256;
            ctx.fillStyle = '#ff1e56'; ctx.fillRect(c-80, 50, 160, 160); 
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(c-60, 210, 120, 60); 
            ctx.fillStyle = '#414868'; ctx.fillRect(c-100, 270, 200, 200); 
            ctx.fillStyle = '#66fcf1'; ctx.fillRect(c-100, 270, 15, 200); 
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0b0c10');
        const camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 1, 1000);
        camera.position.set(30, 30, 30); camera.lookAt(0,0,0);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 3));

        const hero = new THREE.Sprite(new THREE.SpriteMaterial({ map: await createTex(), fog: false }));
        hero.scale.set(6, 6, 1); hero.position.y = 3; scene.add(hero);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x1a1b26 }));
        ground.rotation.x = -Math.PI/2; scene.add(ground);
        scene.add(new THREE.GridHelper(100, 20, 0x45a29e, 0x1f2833));

        // --- 모바일 조작 시스템 ---
        let startX, startY;
        window.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            lastTouchTime = Date.now();
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isStarted || isGameOver) return;
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            
            // 드래그 방향 계산
            const deltaX = touchX - startX;
            const deltaY = touchY - startY;
            
            // 입력 보정 (이동 벡터 생성)
            moveDir.set(deltaX, -deltaY).normalize();
            
            // 캐릭터 실제 이동은 animate에서 수행
            startX = touchX;
            startY = touchY;
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            const duration = Date.now() - lastTouchTime;
            if (duration < 150) attack(); // 짧게 터치 시 공격
            moveDir.set(0, 0);
        });

        document.getElementById('btn-start').onclick = () => { 
            nickname = document.getElementById('nick-field').value.trim() || "익명";
            document.getElementById('display-nick').innerText = nickname;
            isStarted = true; 
            document.getElementById('start-screen').style.display='none'; 
            document.getElementById('ui-layer').style.display='block'; 
        };

        function attack() {
            monsters.forEach(m => {
                if (m.visible && hero.position.distanceTo(m.position) < 8) {
                    m.visible = false; score += 100;
                    document.getElementById('score-board').innerText = score;
                }
            });
        }

        function spawn() {
            const m = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0xf7768e }));
            m.scale.set(2.5, 2.5, 1);
            m.position.set((Math.random()-0.5)*70, 1, (Math.random()-0.5)*70);
            scene.add(m); monsters.push(m);
        }

        let lastSpawn = 0;
        function animate(time) {
            requestAnimationFrame(animate);
            if (!isStarted || isGameOver) return;

            // 모바일 드래그 이동 로직 (화면 좌표계를 게임 좌표계로 변환)
            if (moveDir.length() > 0) {
                // 쿼터뷰 각도 보정 이동
                const moveSpeed = 0.35;
                hero.position.x += (moveDir.x - moveDir.y) * moveSpeed * 0.7;
                hero.position.z -= (moveDir.x + moveDir.y) * moveSpeed * 0.7;
                
                if (moveDir.x > 0) hero.scale.x = 6; else if (moveDir.x < 0) hero.scale.x = -6;
            }

            camera.position.set(hero.position.x+25, hero.position.y+25, hero.position.z+25);
            camera.lookAt(hero.position);

            monsters.forEach(m => {
                if (m.visible) {
                    const dir = new THREE.Vector3().subVectors(hero.position, m.position).normalize();
                    m.position.addScaledVector(dir, 0.1 + (score/4000));
                    if (hero.position.distanceTo(m.position) < 2.5) hp -= 1.2;
                }
            });

            document.getElementById('hp-bar').style.width = hp + "%";
            if (hp <= 0) { 
                isGameOver = true; 
                document.getElementById('game-over-screen').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
                document.getElementById('player-tag').innerText = `PLAYER: ${nickname}`;
                const tier = getTierInfo(score);
                const tEl = document.getElementById('tier-text');
                tEl.innerText = tier.text; tEl.style.color = tier.color;
            }
            if (time - lastSpawn > 1400) { spawn(); lastSpawn = time; }
            renderer.render(scene, camera);
        }
        animate(0);

        window.captureScreen = () => {
            html2canvas(document.getElementById('game-over-screen'), { backgroundColor: '#0b0c10' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `RPG_${nickname}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        };

        window.shareResult = () => {
            const text = `[UHD 픽셀 RPG]\n플레이어: ${nickname}\n티어: ${document.getElementById('tier-text').innerText}\n점수: ${score}점!\n지금 도전해보세요!`;
            if (navigator.share) {
                navigator.share({ title: 'UHD 픽셀 RPG 결과', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('클립보드에 복사되었습니다!'));
            }
        };

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
