<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탑 쌓기 - 킬링타임천국</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a15;
    color: #e2e8f0;
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #homeScreen {
    text-align: center;
    padding: 30px 20px;
    max-width: 380px;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #a855f7, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 28px; }
  .how-to {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 24px;
    text-align: left;
    font-size: 0.88rem;
    color: #94a3b8;
    line-height: 1.9;
  }
  .how-to strong { color: #c084fc; }
  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #a855f7, #f472b6);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(168,85,247,0.4);
    transition: transform 0.15s;
  }
  .start-btn:hover { transform: translateY(-3px); }

  /* Game UI */
  #gameUI {
    display: none;
    position: relative;
    width: 100vw;
    max-width: 420px;
    height: 100vh;
    max-height: 700px;
  }

  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px 0;
    z-index: 10;
    pointer-events: none;
  }
  .hud-score {
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(168,85,247,0.8);
  }
  .hud-best {
    font-size: 0.85rem;
    color: #64748b;
    text-align: right;
  }
  .hud-best span { color: #fbbf24; font-weight: 700; }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Tap hint overlay */
  .tap-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 0.85rem;
    pointer-events: none;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:0.7} }

  /* Result overlay */
  #resultOverlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,21,0.92);
    z-index: 20;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    backdrop-filter: blur(6px);
  }
  .res-emoji { font-size: 4rem; margin-bottom: 12px; }
  .res-title {
    font-size: 1.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #a855f7, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .res-score { font-size: 3rem; font-weight: 900; color: #fff; margin-bottom: 4px; }
  .res-label { color: #64748b; font-size: 0.9rem; margin-bottom: 6px; }
  .res-best { color: #fbbf24; font-weight: 700; font-size: 1rem; margin-bottom: 28px; }
  .res-btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, #a855f7, #f472b6);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(168,85,247,0.4);
  }
  .res-btn:hover { transform: translateY(-2px); }
  .home-link { color: #64748b; font-size: 0.85rem; text-decoration: none; }
  .home-link:hover { color: #94a3b8; }

  /* Score pop */
  .score-pop {
    position: absolute;
    font-size: 1.4rem;
    font-weight: 900;
    color: #a855f7;
    pointer-events: none;
    animation: popUp 0.8s ease forwards;
    z-index: 15;
  }
  @keyframes popUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
  }
</style>
</head>
<body>

<!-- Home -->
<div id="homeScreen">
  <h1>🏗️ 탑 쌓기</h1>
  <p class="subtitle">얼마나 높이 쌓을 수 있을까?</p>
  <div class="how-to">
    <strong>🎮 조작 방법</strong><br>
    • <strong>클릭 / 탭</strong>으로 블록을 떨어뜨리세요<br>
    • 아래 블록과 <strong>겹치는 부분</strong>만 남아요<br>
    • 블록이 너무 작아지면 게임 오버!<br>
    • 층수가 올라갈수록 속도가 빨라져요
  </div>
  <button class="start-btn" onclick="initGame()">▶ 게임 시작</button>
</div>

<!-- Game -->
<div id="gameUI">
  <div class="game-hud">
    <div class="hud-score" id="hudScore">0</div>
    <div class="hud-best">최고 기록<br><span id="hudBest">0</span>층</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div class="tap-hint" id="tapHint">탭 또는 클릭하세요</div>
  <div id="resultOverlay">
    <div class="res-emoji">😵</div>
    <div class="res-title">게임 오버!</div>
    <div class="res-score" id="resScore">0</div>
    <div class="res-label">층</div>
    <div class="res-best" id="resBest"></div>
    <button class="res-btn" onclick="initGame()">🔄 다시 하기</button>
    <a href="index.html" class="home-link">← 홈으로</a>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// State
let blocks = [];
let moving = null;
let score = 0;
let gameOver = false;
let animId = null;
let cameraY = 0;
let targetCameraY = 0;
let speed = 2;
let direction = 1;

// Colors
const PALETTE = [
  ['#a855f7','#9333ea'],
  ['#06b6d4','#0891b2'],
  ['#f472b6','#ec4899'],
  ['#818cf8','#6366f1'],
  ['#34d399','#10b981'],
  ['#fb923c','#f97316'],
  ['#fbbf24','#f59e0b'],
];

const BLOCK_H = 30;
const BASE_W = 220;
const CANVAS_W = 420;
const CANVAS_H = 700;

function setSize() {
  const w = Math.min(window.innerWidth, CANVAS_W);
  const h = Math.min(window.innerHeight, CANVAS_H);
  canvas.width = w;
  canvas.height = h;
}

function initGame() {
  setSize();
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'block';
  document.getElementById('resultOverlay').style.display = 'none';
  document.getElementById('tapHint').style.display = 'block';
  document.getElementById('hudBest').textContent = localStorage.getItem('tower_best') || '0';

  blocks = [];
  score = 0;
  gameOver = false;
  cameraY = 0;
  targetCameraY = 0;
  speed = 2.2;
  direction = 1;

  document.getElementById('hudScore').textContent = '0';

  const cw = canvas.width;
  // 바닥 블록
  const baseX = (cw - BASE_W) / 2;
  const baseY = canvas.height - 60;
  blocks.push({ x: baseX, y: baseY, w: BASE_W, color: PALETTE[0] });

  spawnMoving();

  if (animId) cancelAnimationFrame(animId);
  loop();
}

function spawnMoving() {
  const cw = canvas.width;
  const last = blocks[blocks.length - 1];
  const ci = blocks.length % PALETTE.length;
  const newY = last.y - BLOCK_H - 4;
  const startX = direction > 0 ? -last.w : cw;

  moving = {
    x: startX,
    y: newY,
    w: last.w,
    color: PALETTE[ci],
    targetY: newY,
  };
  direction *= -1;
}

function loop() {
  if (gameOver) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  if (!moving) return;
  moving.x += speed * direction * -1;

  // Camera tracking
  const topBlock = blocks[blocks.length - 1];
  const targetY = topBlock.y - canvas.height * 0.35;
  targetCameraY += (targetY - targetCameraY) * 0.08;
}

function draw() {
  const cw = canvas.width;
  const ch = canvas.height;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, ch);
  grad.addColorStop(0, '#06030f');
  grad.addColorStop(1, '#0a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  // Stars
  ctx.save();
  const seed = 42;
  for (let i = 0; i < 60; i++) {
    const sx = ((seed * (i * 17 + 3)) % cw + cw) % cw;
    const sy = ((seed * (i * 13 + 7)) % (ch * 3) + ch * 3) % (ch * 3);
    const alpha = 0.2 + (i % 5) * 0.1;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy - targetCameraY * 0.3, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(0, -targetCameraY);

  // Placed blocks
  blocks.forEach((b, i) => {
    const [c1, c2] = b.color;
    const g = ctx.createLinearGradient(b.x, b.y, b.x + b.w, b.y + BLOCK_H);
    g.addColorStop(0, c1);
    g.addColorStop(1, c2);
    ctx.fillStyle = g;
    drawRounded(b.x, b.y, b.w, BLOCK_H, 6);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    drawRounded(b.x + 4, b.y + 4, b.w - 8, 6, 3);
    ctx.fill();
  });

  // Moving block
  if (moving) {
    const [c1, c2] = moving.color;
    const g = ctx.createLinearGradient(moving.x, moving.y, moving.x + moving.w, moving.y + BLOCK_H);
    g.addColorStop(0, c1);
    g.addColorStop(1, c2);
    ctx.fillStyle = g;
    drawRounded(moving.x, moving.y, moving.w, BLOCK_H, 6);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    drawRounded(moving.x + 4, moving.y + 4, moving.w - 8, 6, 3);
    ctx.fill();

    // Glow
    ctx.shadowColor = moving.color[0];
    ctx.shadowBlur = 16;
    ctx.fillStyle = 'transparent';
    drawRounded(moving.x, moving.y, moving.w, BLOCK_H, 6);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawRounded(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drop() {
  if (gameOver || !moving) return;
  document.getElementById('tapHint').style.display = 'none';

  const last = blocks[blocks.length - 1];
  const overlapStart = Math.max(moving.x, last.x);
  const overlapEnd = Math.min(moving.x + moving.w, last.x + last.w);
  const overlap = overlapEnd - overlapStart;

  if (overlap <= 0) {
    // 완전 miss
    triggerGameOver();
    return;
  }

  // Perfect bonus
  const perfect = Math.abs(moving.x - last.x) < 3;

  const newBlock = {
    x: overlapStart,
    y: moving.y,
    w: overlap,
    color: moving.color,
  };
  blocks.push(newBlock);
  score++;
  document.getElementById('hudScore').textContent = score;

  // Score pop
  showScorePop(perfect);

  // Speed up
  speed = 2.2 + score * 0.08;
  if (speed > 9) speed = 9;

  // Too thin?
  if (overlap < 12) {
    triggerGameOver();
    return;
  }

  spawnMoving();
}

function showScorePop(perfect) {
  const gameUI = document.getElementById('gameUI');
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = perfect ? '✨ PERFECT!' : `+1`;
  pop.style.left = '50%';
  pop.style.top = '45%';
  pop.style.transform = 'translateX(-50%)';
  if (perfect) pop.style.color = '#fbbf24';
  gameUI.appendChild(pop);
  setTimeout(() => pop.remove(), 800);
}

function triggerGameOver() {
  gameOver = true;
  cancelAnimationFrame(animId);

  const best = parseInt(localStorage.getItem('tower_best') || '0');
  const newBest = Math.max(best, score);
  localStorage.setItem('tower_best', newBest);

  document.getElementById('resScore').textContent = score;
  document.getElementById('resBest').textContent = score >= newBest && score > 0
    ? `🎉 신기록! ${newBest}층`
    : `최고 기록: ${newBest}층`;

  setTimeout(() => {
    document.getElementById('resultOverlay').style.display = 'flex';
  }, 600);
}

// Input
document.addEventListener('click', () => { if (!gameOver) drop(); });
document.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameOver) drop();
}, { passive: false });
document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'ArrowUp') && !gameOver) {
    e.preventDefault();
    drop();
  }
});

window.addEventListener('resize', () => {
  if (document.getElementById('gameUI').style.display !== 'none') {
    setSize();
  }
});
</script>
</body>
</html>
