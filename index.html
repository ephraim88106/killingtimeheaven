<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>킬링타임천국 - 최고의 웹게임 허브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    <header class="hero-section">
      <h1 class="main-title">킬링타임<span>천국</span></h1>
      <p class="subtitle">지루할 틈 없는 세상, 지금 바로 시작하세요!</p>
    </header>

    <div class="game-selection">
      <!-- Game 1: 용사의 모험 -->
      <section class="game-group">
        <h2 class="game-title">용사의 모험</h2>
        <div class="button-grid">
          <button class="game-btn hero-pc" aria-label="용사의 모험 PC">
            <span class="btn-text">용사의 모험</span>
            <span class="btn-tag">PC</span>
          </button>
          <button class="game-btn hero-mobile" aria-label="용사의 모험 모바일">
            <span class="btn-text">용사의 모험</span>
            <span class="btn-tag mobile">모바일</span>
          </button>
        </div>
      </section>

      <!-- Game 2: SSS급 도전하기 -->
      <section class="game-group">
        <h2 class="game-title">SSS급 도전하기</h2>
        <div class="button-grid">
          <button class="game-btn sss-pc" aria-label="SSS급 도전하기 PC">
            <span class="btn-text">SSS급 도전하기</span>
            <span class="btn-tag">PC</span>
          </button>
          <button class="game-btn sss-mobile" aria-label="SSS급 도전하기 모바일">
            <span class="btn-text">SSS급 도전하기</span>
            <span class="btn-tag mobile">모바일</span>
          </button>
        </div>
      </section>
    </div>
  </main>
  <script defer src="main.js"></script>
</body>
</html>
