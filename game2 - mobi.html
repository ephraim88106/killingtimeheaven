    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9118774019383180" crossorigin="anonymous"></script>

  <title>SSS등급(신급) 도전 - 모바일</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Pretendard', sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel { position: absolute; padding: 12px; background: rgba(11, 12, 16, 0.95); border: 2px solid #ff00ff; border-radius: 10px; color: #fff; box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
        
        #status { top: 15px; left: 15px; width: 150px; }
        #hp-bar-container { width: 100%; height: 12px; background: #1f2833; margin-top: 5px; border-radius: 6px; overflow: hidden; border: 1px solid #f7768e; }
        #hp-bar { width: 100%; height: 100%; background: #ff0000; transition: width 0.1s; box-shadow: 0 0 10px #ff0000; }
        
        #score-board { top: 15px; right: 15px; text-align: right; }
        #score-val { font-size: 28px; color: #66fcf1; font-weight: bold; text-shadow: 0 0 10px #66fcf1; }
        
        #ranking-panel { bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; font-size: 12px; pointer-events: auto; }
        .rank-header { border-bottom: 2px solid #ff00ff; padding-bottom: 3px; margin-bottom: 5px; color: #ff00ff; font-weight: bold; text-align: center; font-size: 14px; }
        .rank-item { display: flex; justify-content: space-between; margin: 2px 0; }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(0,0,0,0.95); z-index: 100; pointer-events: auto;
        }
        #game-title { color: #ff00ff; font-size: 32px; font-weight: 900; text-shadow: 0 0 20px #ff00ff; text-align: center; margin-bottom: 20px; width: 80%; }
        
        #nick-input { 
            padding: 12px; font-size: 18px; border-radius: 10px; border: 2px solid #ff00ff; 
            background: #111; color: #fff; text-align: center; margin-bottom: 20px; width: 60%; outline: none;
        }
        
        #tier-display { font-size: 80px; font-weight: 900; margin: 5px 0; text-shadow: 0 0 30px currentColor; }
        #tier-sub { font-size: 24px; margin-bottom: 10px; font-weight: bold; }
        #player-name-tag { font-size: 18px; color: #66fcf1; margin-bottom: 5px; font-weight: bold; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; width: 80%; }
        button { 
            flex: 1; padding: 15px 0; font-size: 18px; cursor: pointer; background: #ff00ff; 
            border: none; border-radius: 12px; color: #fff; font-weight: bold; 
            box-shadow: 0 0 15px #ff00ff; transition: 0.2s;
        }
        button:active { transform: scale(0.95); background: #fff; color: #ff00ff; }
        .btn-sub { background: #333; box-shadow: none; font-size: 14px; color: #ccc; }
        
        #guide-msg { position: absolute; bottom: 120px; width: 100%; text-align: center; color: #66fcf1; font-size: 12px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="start-screen" class="overlay">
        <div id="game-title">SSS등급(신급)에<br>도전하세요!</div>
        <input type="text" id="nick-input" placeholder="닉네임 입력" maxlength="10">
        <button onclick="startGameWithNick()" style="width: 60%;">도전 시작</button>
        <p style="color: #66fcf1; font-size: 12px; margin-top: 20px;">화면을 좌우로 밀어서 조작하세요</p>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <div id="player-name-tag"></div>
        <h1 style="color: #f7768e; font-size: 24px; margin:0;">MISSION COMPLETE</h1>
        <div id="tier-display"></div>
        <div id="tier-sub"></div>
        <p style="color:white; font-size: 20px; margin: 8px 0;">최종 점수: <span id="final-score">0</span></p>
        
        <div class="btn-group">
            <button onclick="location.reload()">다시 도전</button>
        </div>
        <div class="btn-group">
            <button class="btn-sub" onclick="captureScreen()">🖼️ 결과 캡처</button>
            <button class="btn-sub" onclick="shareResult()">🔗 기록 공유</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none;">
        <div id="status" class="panel">
            <b id="ui-nick-display" style="color:#66fcf1; font-size: 12px;">PLAYER</b>
            <div id="hp-bar-container"><div id="hp-bar"></div></div>
        </div>
        <div id="score-board" class="panel">
            <div id="score-val">0</div>
        </div>
        <div id="guide-msg">화면을 밀어 이동 (Swipe)</div>
        <div id="ranking-panel" class="panel">
            <div class="rank-header">🏆 명예의 전당 (Top 5)</div>
            <div id="rank-list"></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let isStarted = false, isGameOver = false, hp = 100, score = 0;
        let diff = 1.0, nickname = "익명";
        const monsters = [];
        let lastSpawn = 0;

        // 모바일 터치 제어 변수
        let touchStartX = 0;
        let carBaseX = 0;

        window.getTierInfo = function(s) {
            if (s >= 30000) return { t: "SSS", n: "신급", c: "#ff00ff" };
            if (s >= 20000) return { t: "SS", n: "개고수", c: "#bb9af7" };
            if (s >= 15000) return { t: "S", n: "고수", c: "#66fcf1" };
            if (s >= 10000) return { t: "A", n: "순발력있음", c: "#73daca" };
            if (s >= 7000) return { t: "B", n: "생각있음", c: "#e0af68" };
            if (s >= 5000) return { t: "C", n: "손있음", c: "#ff9e64" };
            if (s >= 3000) return { t: "D", n: "눈있음", c: "#7aa2f7" };
            if (s >= 1000) return { t: "E", n: "허접", c: "#a9b1d6" };
            return { t: "F", n: "개허접", c: "#f7768e" };
        }

        function createTex(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const c = 256;
            if (type === 'car') {
                ctx.fillStyle = '#ff00ff'; ctx.fillRect(c-100, 200, 200, 600);
                ctx.fillStyle = '#1a1b26'; ctx.fillRect(c-80, 350, 160, 150); 
                ctx.fillStyle = '#fff'; ctx.fillRect(c-90, 200, 40, 30); ctx.fillRect(c+50, 200, 40, 30);
            } else if (type === 'slime') {
                ctx.fillStyle = '#f7768e'; ctx.beginPath(); ctx.arc(c, 512, 200, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 15; ctx.stroke();
            } else if (type === 'road') {
                ctx.fillStyle = '#050505'; ctx.fillRect(0,0,512,1024);
                ctx.fillStyle = '#ff00ff'; ctx.fillRect(c-10, 0, 20, 1024);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        const scene = new THREE.Scene();
        // 모바일용 세로 비율 카메라 조정
        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(-20*aspect, 20*aspect, 20, -20, 1, 1000);
        camera.position.set(0, 50, 10); camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 2.5));

        const car = new THREE.Sprite(new THREE.SpriteMaterial({ map: createTex('car') }));
        car.scale.set(4.5, 9, 1); car.position.set(0, 2.5, 8); scene.add(car);

        const roadMat = new THREE.MeshStandardMaterial({ map: createTex('road') });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 200), roadMat);
        ground.rotation.x = -Math.PI/2; scene.add(ground);

        // --- 모바일 드래그 조작 로직 ---
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            carBaseX = car.position.x;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isStarted || isGameOver) return;
            const touchX = e.touches[0].clientX;
            const deltaX = (touchX - touchStartX) * 0.1; // 민감도 조절
            let newX = carBaseX + deltaX;
            // 이동 범위 제한
            car.position.x = Math.max(-18, Math.min(18, newX));
        });

        window.startGameWithNick = () => {
            const input = document.getElementById('nick-input').value;
            nickname = input.trim() || "익명";
            document.getElementById('ui-nick-display').innerText = nickname;
            isStarted = true; 
            document.getElementById('start-screen').style.display='none'; 
            document.getElementById('ui-layer').style.display='block';
        };

        function updateRankBoard() {
            let ranks = JSON.parse(localStorage.getItem('sss_ranks_v2') || "[]");
            if (isGameOver) {
                ranks.push({ name: nickname, score: score });
                ranks.sort((a, b) => b.score - a.score);
                ranks = ranks.slice(0, 5);
                localStorage.setItem('sss_ranks_v2', JSON.stringify(ranks));
            }
            const list = document.getElementById('rank-list');
            list.innerHTML = ranks.map((r, i) => {
                const info = window.getTierInfo(r.score);
                return `<div class="rank-item ${r.name === nickname && r.score === score && isGameOver ? 'my-rank' : ''}">
                    <span>${i+1}위 [${r.name}]</span>
                    <span>${info.t}급 / ${r.score.toLocaleString()} 점</span>
                </div>`;
            }).join('') || '<div style="text-align:center; opacity:0.5;">기록을 세우세요!</div>';
        }

        const sTex = createTex('slime');
        function spawn() {
            const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: sTex }));
            s.scale.set(3.5, 3.5, 1);
            s.position.set((Math.random()-0.5)*35, 2, -120);
            scene.add(s); monsters.push(s);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            if (!isStarted || isGameOver) return;

            diff += 0.0008; 
            const curSpeed = diff * 1.8;
            score += Math.floor(diff * 2);
            
            document.getElementById('score-val').innerText = score.toLocaleString();
            document.getElementById('hp-bar').style.width = hp + "%";
            roadMat.map.offset.y += curSpeed * 0.025;

            monsters.forEach((m, i) => {
                m.position.z += curSpeed;
                if (car.position.distanceTo(m.position) < 4.0) {
                    hp -= 34;
                    scene.remove(m); monsters.splice(i, 1);
                    if (hp <= 0) {
                        isGameOver = true;
                        const tier = window.getTierInfo(score);
                        document.getElementById('game-over-screen').style.display = 'flex';
                        document.getElementById('final-score').innerText = score.toLocaleString();
                        document.getElementById('tier-display').innerText = tier.t;
                        document.getElementById('tier-sub').innerText = `(${tier.n})`;
                        document.getElementById('tier-display').style.color = tier.c;
                        document.getElementById('tier-sub').style.color = tier.c;
                        document.getElementById('player-name-tag').innerText = `PLAYER: ${nickname}`;
                        updateRankBoard();
                    }
                }
                if (m.position.z > 25) { scene.remove(m); monsters.splice(i, 1); }
            });

            if (time - lastSpawn > 1200 / diff) { spawn(); lastSpawn = time; }
            renderer.render(scene, camera);
        }
        updateRankBoard();
        animate(0);

        window.captureScreen = () => {
            const area = document.getElementById('game-over-screen');
            html2canvas(area, { backgroundColor: '#050505' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Result_${nickname}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        window.shareResult = () => {
            const finalScore = document.getElementById('final-score').innerText;
            const tier = document.getElementById('tier-display').innerText;
            const text = `[SSS등급 도전기]\n${nickname}\n등급: ${tier}\n점수: ${finalScore}점!\n지금 도전해보세요!`;
            if (navigator.share) {
                navigator.share({ title: 'SSS등급(신급)에 도전하세요!', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('클립보드에 복사되었습니다!'));
            }
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -20 * aspect; camera.right = 20 * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
