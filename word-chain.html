<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>끝말잇기 배틀 - 킬링타임천국</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a15;
    color: #e2e8f0;
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #a855f7, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; text-align: center; }

  #homeScreen { text-align: center; width: 100%; max-width: 100%; }
  .rules {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 24px;
    text-align: left;
    font-size: 0.88rem;
    color: #94a3b8;
    line-height: 1.9;
  }
  .rules strong { color: #c084fc; }
  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #a855f7, #06b6d4);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(168,85,247,0.4);
    transition: transform 0.15s;
  }
  .start-btn:hover { transform: translateY(-3px); }

  #gameScreen { display: none; width: 100%; max-width: 100%; }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    font-size: 0.9rem;
  }
  .turn-label { font-weight: 700; font-size: 1rem; }
  .turn-player { color: #06b6d4; }
  .turn-ai { color: #f472b6; }
  .score-display { color: #a855f7; font-weight: 700; }

  .timer-bar-wrap {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, #06b6d4, #a855f7);
    border-radius: 99px;
    transition: width 0.1s linear;
  }
  .timer-bar.urgent { background: linear-gradient(90deg, #ef4444, #f97316); }

  .chat-area {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px;
    min-height: 240px;
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 99px; }

  .msg { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.3s ease; }
  .msg.player { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }
  .msg.system { align-self: center; align-items: center; max-width: 90%; }

  .msg-bubble { padding: 10px 16px; border-radius: 18px; font-size: 1.1rem; font-weight: 700; }
  .player .msg-bubble { background: linear-gradient(135deg, #06b6d4, #0284c7); color: #fff; border-bottom-right-radius: 4px; }
  .ai .msg-bubble { background: rgba(248,113,221,0.15); border: 1px solid rgba(248,113,221,0.3); color: #f472b6; border-bottom-left-radius: 4px; }
  .system .msg-bubble { background: rgba(255,255,255,0.06); color: #64748b; font-size: 0.8rem; font-weight: 400; border-radius: 8px; text-align: center; }
  .msg-name { font-size: 0.72rem; color: #64748b; margin-bottom: 3px; padding: 0 4px; }

  .input-area { display: flex; gap: 10px; }
  .word-input {
    flex: 1;
    padding: 14px 18px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .word-input:focus { border-color: #a855f7; }
  .word-input:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn {
    padding: 14px 20px;
    background: linear-gradient(135deg, #a855f7, #06b6d4);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s;
    white-space: nowrap;
  }
  .send-btn:hover { transform: scale(1.04); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .hint-text { text-align: center; margin-top: 10px; font-size: 0.85rem; color: #64748b; min-height: 20px; }
  .hint-text .required { color: #06b6d4; font-weight: 700; font-size: 1rem; }

  #resultScreen { display: none; text-align: center; width: 100%; max-width: 100%; }
  .result-icon { font-size: 4rem; margin-bottom: 12px; }
  .result-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
  .result-title.win { background: linear-gradient(135deg, #06b6d4, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .result-title.lose { background: linear-gradient(135deg, #ef4444, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .result-desc { color: #94a3b8; margin-bottom: 6px; font-size: 0.95rem; }
  .result-score { color: #a855f7; font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; }
  .result-best { color: #fbbf24; font-size: 0.9rem; margin-bottom: 24px; }
  .retry-btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, #a855f7, #06b6d4);
    border: none; border-radius: 14px;
    color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(168,85,247,0.4);
    transition: transform 0.15s;
  }
  .retry-btn:hover { transform: translateY(-2px); }
  .home-link { color: #64748b; font-size: 0.85rem; text-decoration: none; }
  .home-link:hover { color: #94a3b8; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .shake { animation: shake 0.3s ease; }

  .ai-thinking {
    display: flex; gap: 4px;
    padding: 12px 16px;
    background: rgba(248,113,221,0.1);
    border: 1px solid rgba(248,113,221,0.2);
    border-radius: 18px; border-bottom-left-radius: 4px;
    align-self: flex-start;
  }
  .dot { width: 7px; height: 7px; background: #f472b6; border-radius: 50%; animation: bounce 0.8s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
</style>

<div id="homeScreen">
  <h1>🗣️ 끝말잇기 배틀</h1>
  <p class="subtitle">AI와의 한국어 단어 대결!</p>
  <div class="rules">
    <strong>📖 게임 방법</strong><br>
    • 이전 단어의 <strong>마지막 글자</strong>로 시작하는 단어 입력<br>
    • 턴당 <strong>15초</strong> 제한 — 남은 시간이 표시돼요<br>
    • 이미 쓴 단어는 재사용 불가<br>
    • 두 글자 이상의 한국어 단어만 가능<br>
    • AI가 단어를 못 찾으면 <strong>승리!</strong>
  </div>
  <button class="start-btn" onclick="startGame()">▶ 게임 시작</button>
</div>

<div id="gameScreen">
  <div class="status-bar">
    <span class="turn-label" id="turnLabel"><span class="turn-player">내 차례</span></span>
    <span class="score-display">단어 <span id="wordCount">0</span>개</span>
  </div>
  <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <input class="word-input" id="wordInput" type="text" placeholder="단어 입력..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="send-btn" id="sendBtn" onclick="submitWord()">입력</button>
  </div>
  <div class="hint-text" id="hintText"></div>
</div>

<div id="resultScreen">
  <div class="result-icon" id="resultIcon"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-desc" id="resultDesc"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-best" id="resultBest"></div>
  <button class="retry-btn" onclick="startGame()">🔄 다시 하기</button><br>
  <a href="index.html" class="home-link">← 홈으로</a>
</div>

// 두음법칙 처리 (ㄹ→ㄴ, ㄴ→이)
function applyDueum(syllable) {
  const map = {"라":"나","래":"내","랑":"낭","런":"넌","레":"네","려":"녀","력":"역","렴":"염","령":"영","례":"예","로":"노","론":"논","뢰":"뇌","루":"누","류":"유","률":"율","름":"늠","릉":"능","리":"이","린":"인","림":"임","립":"입"};
  return map[syllable] || syllable;
}

  document.getElementById('timerBar').style.width = '100%';

  // AI가 첫 단어 제시
  const pool = ["가방","나무","다음","라면","마음","바다","사랑","아이","자유","하늘","고양이","동물","모험","우주","행복","노래","미래","여행","지구"];
  const firstWord = pool[Math.floor(Math.random() * pool.length)];
  usedWords.add(firstWord);
  currentLast = firstWord[firstWord.length - 1];
  wordCount++;

  addMessage('ai', firstWord);
  updateUI();

  // gameActive는 약간 딜레이 후 true (AI 첫 단어 표시 후)
  setTimeout(() => {
    gameActive = true;
    startTimer();
    document.getElementById('wordInput').focus();
  }, 300);
}

function addMessage(who, text) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  if (who === 'system') {
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  } else {
    div.innerHTML = `<div class="msg-name">${who === 'player' ? '나' : 'AI'}</div><div class="msg-bubble">${text}</div>`;
  }
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showThinking() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.id = 'thinkingBubble';
  div.className = 'ai-thinking';
  div.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinkingBubble');
  if (el) el.remove();
}

function updateUI() {
  document.getElementById('turnLabel').innerHTML = isPlayerTurn
    ? '<span class="turn-player">내 차례</span>'
    : '<span class="turn-ai">AI 차례</span>';
  const hint = document.getElementById('hintText');
  if (isPlayerTurn && currentLast) {
    hint.innerHTML = `"<span class="required">${currentLast}</span>"(으)로 시작하는 단어를 입력하세요`;
  } else {
    hint.innerHTML = 'AI가 생각 중...';
  }
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 15;
  updateTimerBar();
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    updateTimerBar();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame(false, '⏰ 시간 초과! AI의 승리');
    }
  }, 100);
}

function updateTimerBar() {
  const bar = document.getElementById('timerBar');
  const pct = Math.max(0, (timeLeft / 15) * 100);
  bar.style.width = pct + '%';
  bar.classList.toggle('urgent', timeLeft < 5);
}

function isKorean(str) {
  return /^[가-힣]+$/.test(str);
}

function submitWord() {
  if (!gameActive || !isPlayerTurn) return;
  const input = document.getElementById('wordInput');
  const word = input.value.trim();
  input.value = '';
  if (!word) return;

  // 한국어 체크
  if (!isKorean(word)) {
    shakeInput();
    addMessage('system', '❌ 한국어만 입력할 수 있어요!');
    return;
  }
  // 두 글자 이상
  if (word.length < 2) {
    shakeInput();
    addMessage('system', '❌ 두 글자 이상 입력하세요!');
    return;
  }
  // 첫 글자 확인 (두음법칙 허용)
  if (currentLast) {
    const alt = applyDueum(currentLast);
    if (word[0] !== currentLast && word[0] !== alt) {
      shakeInput();
      addMessage('system', `❌ "${currentLast}"로 시작하는 단어를 입력하세요!`);
      return;
    }
  }
  // 중복
  if (usedWords.has(word)) {
    shakeInput();
    addMessage('system', '❌ 이미 사용한 단어예요!');
    return;
  }

  // ✅ 유효
  clearInterval(timerInterval);
  usedWords.add(word);
  currentLast = word[word.length - 1];
  wordCount++;
  document.getElementById('wordCount').textContent = wordCount;
  addMessage('player', word);

  isPlayerTurn = false;
  document.getElementById('wordInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  updateUI();

  // AI 턴
  setTimeout(() => {
    showThinking();
    setTimeout(() => { removeThinking(); aiTurn(); }, 800 + Math.random() * 1000);
  }, 200);
}

function aiTurn() {
  const candidates = getAICandidates(currentLast);
  if (candidates.length === 0) {
    endGame(true, 'AI가 단어를 찾지 못했어요!');
    return;
  }
  const pick = candidates[Math.floor(Math.random() * Math.min(5, candidates.length))];
  usedWords.add(pick);
  currentLast = pick[pick.length - 1];
  wordCount++;
  document.getElementById('wordCount').textContent = wordCount;
  addMessage('ai', pick);

  isPlayerTurn = true;
  document.getElementById('wordInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  updateUI();
  startTimer();
  document.getElementById('wordInput').focus();
}

function getAICandidates(syllable) {
  const alt = applyDueum(syllable);
  const set1 = (AI_DB[syllable] || []).filter(w => !usedWords.has(w));
  const set2 = alt !== syllable ? (AI_DB[alt] || []).filter(w => !usedWords.has(w)) : [];
  return [...set1, ...set2];
}

function shakeInput() {
  const inp = document.getElementById('wordInput');
  inp.classList.remove('shake');
  void inp.offsetWidth;
  inp.classList.add('shake');
}

function endGame(win, reason) {
  clearInterval(timerInterval);
  gameActive = false;
  document.getElementById('wordInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;

  const best = parseInt(localStorage.getItem('wordchain_best') || '0');
  const newBest = Math.max(best, wordCount);
  localStorage.setItem('wordchain_best', newBest);

  setTimeout(() => {
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('resultIcon').textContent = win ? '🏆' : '😵';
    const title = document.getElementById('resultTitle');
    title.textContent = win ? '승리!' : '패배...';
    title.className = 'result-title ' + (win ? 'win' : 'lose');
    document.getElementById('resultDesc').textContent = reason;
    document.getElementById('resultScore').textContent = `주고받은 단어: ${wordCount}개`;
    document.getElementById('resultBest').textContent = `최고 기록: ${newBest}개${wordCount >= newBest && wordCount > 0 ? ' 🎉 신기록!' : ''}`;
  }, 500);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('wordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitWord();
  });
});
</script>
